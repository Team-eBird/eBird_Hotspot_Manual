name: Build Translated Site

  on:
    push:
      branches:
        - main
        - translations
      paths:
        - 'po/*.po'
        - '**.qmd'

  jobs:
    build:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4

        - name: Install po4a
          run: sudo apt-get install -y po4a

        - name: Apply translations
          run: po4a po4a.cfg

        - name: Install Quarto
          uses: quarto-dev/quarto-actions/setup@v2

        - name: Copy quarto config to translated dirs
          run: |
            for lang in en es_419; do
              if [ -d "translated/$lang" ]; then
                cp _quarto.yml translated/$lang/_quarto.yml
              fi
            done

        - name: Build each language
          run: |
            for lang in en es_419; do
              if [ -d "translated/$lang" ]; then
                quarto render translated/$lang --output-dir docs/$lang
              fi
            done

        - name: Deploy to GitHub Pages
          uses: peaceiris/actions-gh-pages@v3
          with:
            github_token: ${{ secrets.GITHUB_TOKEN }}
            publish_dir: ./docs
            keep_files: true
